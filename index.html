<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plume</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <nav id="tabbar"></nav>
      <main id="editor"></main>
      <footer id="statusbar">
        <span id="status-path">No file</span>
        <span class="statusbar-right">
          <button id="chunk-prev" class="status-action" hidden>◀</button>
          <button id="chunk-next" class="status-action" hidden>▶</button>
          <span id="status-readonly" hidden></span>
          <span id="status-indexing" hidden></span>
          <button id="status-warning" hidden>⚠ decoded with errors</button>
          <span id="status-cursor">Ln 1, Col 1</span>
          <button id="status-line-ending" class="status-action">LF</button>
          <button id="status-encoding" class="status-action">UTF-8</button>
        </span>
      </footer>
    </div>
    <pre id="print-view"></pre>
  </body>
</html>

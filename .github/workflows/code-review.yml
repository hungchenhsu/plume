name: Jules Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: google-labs-code/jules-action@v1
        if: ${{ secrets.JULES_API_KEY != '' }}
        with:
          prompt: |
            Please review the recent pull request changes and provide feedback as a code reviewer. Leave a pull request review with comments for any identified issues. Look for logic errors, security vulnerabilities, performance bottlenecks, and general code quality issues.
          jules_api_key: ${{ secrets.JULES_API_KEY }}

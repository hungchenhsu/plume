name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (tsc + vite)
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Rust format
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust lint
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

  # Note: a startup-bench job (release build + scripts/startup-bench.mjs
  # with a hard threshold) was attempted here and removed on 2026-07-10.
  # On GitHub's macOS runners the app's WKWebView never begins loading
  # the page — native setup completes in ~1.7s, then silence; the
  # on_page_load Started event never fires — so the startup probe cannot
  # complete. An Aqua session is present and ad-hoc codesigning did not
  # help; root cause undetermined. Run the benchmark locally instead
  # (see scripts/startup-bench.mjs).

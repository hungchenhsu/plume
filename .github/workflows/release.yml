name: Release

# Pushing a v* tag builds installers for macOS (arm64 + x64, code-signed
# and notarized) and Windows (unsigned — OS-level Windows signing is a
# deferred decision, see ROADMAP.md D2), plus updater artifacts (latest.json
# + .sig files), and attaches them to a draft GitHub release for the
# maintainer to review and publish manually — this workflow never publishes
# a release itself. workflow_dispatch runs the same builds without creating
# a release, as a pipeline smoke test.
#
# macOS signing/notarization and updater-artifact signing both need
# repository secrets that only exist once the maintainer has provisioned
# them (see ROADMAP.md D2); until then, the tauri-action step below fails
# on the macOS legs specifically.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # macOS notarization authenticates via an App Store Connect API key.
      # tauri-action/the tauri bundler wants a file path (APPLE_API_KEY_PATH
      # below), but the key can only be stored in GitHub as base64 text
      # (the APPLE_API_KEY_CONTENT secret) — decode it back to a .p8 file
      # here before the build step references its path.
      - name: Decode Apple API key
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (v2.tauri.app/distribute/sign/macos).
          # No-ops on the windows-latest leg, which reads none of these.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
          # Updater artifact signing (v2.tauri.app/plugin/updater) — the
          # private key's public counterpart is `plugins.updater.pubkey` in
          # src-tauri/tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Empty tagName (workflow_dispatch) builds without releasing.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Mojidori ${{ github.ref_name }}
          releaseDraft: true
          prerelease: true
          # Generates and uploads latest.json + per-bundle .sig files so
          # src/updater.ts's endpoint (tauri.conf.json) has something to
          # find once this release is published.
          uploadUpdaterJson: true
          args: ${{ matrix.args }}
